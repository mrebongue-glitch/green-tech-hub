<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  <circle cx="370" cy="35" r="70" fill="#22c55e" opacity="0.06"/>
  <circle cx="30" cy="270" r="90" fill="#3b82f6" opacity="0.05"/>

  <!-- SSD body -->
  <rect x="75" y="65" width="250" height="160" rx="16" fill="url(#body)" filter="url(#s)"/>

  <!-- Top dark stripe -->
  <rect x="75" y="65" width="250" height="50" rx="16" fill="#1e293b"/>
  <rect x="75" y="101" width="250" height="14" fill="#1e293b"/>

  <!-- Brand label -->
  <text x="103" y="84" font-family="Arial Black,Arial" font-size="11" font-weight="900" fill="#22c55e" letter-spacing="3">GMT</text>
  <text x="103" y="97" font-family="Arial,sans-serif" font-size="7" fill="#64748b" letter-spacing="1">GREEN MARKET TECH</text>

  <!-- Capacity -->
  <rect x="218" y="71" width="97" height="36" rx="5" fill="#0f172a" opacity="0.6"/>
  <text x="267" y="95" font-family="Arial Black,Arial" font-size="22" font-weight="900" fill="#f1f5f9" text-anchor="middle">1 TB</text>

  <!-- Circuit lines (decorative) -->
  <g opacity="0.18" stroke="#22c55e" stroke-width="1" fill="none">
    <line x1="110" y1="140" x2="290" y2="140"/>
    <line x1="110" y1="157" x2="185" y2="157"/>
    <line x1="215" y1="157" x2="290" y2="157"/>
    <line x1="145" y1="125" x2="145" y2="172"/>
    <line x1="200" y1="122" x2="200" y2="172"/>
    <line x1="255" y1="125" x2="255" y2="172"/>
    <circle cx="145" cy="140" r="3" fill="#22c55e"/>
    <circle cx="200" cy="140" r="3" fill="#22c55e"/>
    <circle cx="255" cy="140" r="3" fill="#22c55e"/>
    <circle cx="145" cy="157" r="3" fill="#22c55e"/>
    <circle cx="255" cy="157" r="3" fill="#22c55e"/>
  </g>

  <!-- Chip -->
  <rect x="153" y="120" width="94" height="57" rx="5" fill="#1e293b" opacity="0.7"/>
  <rect x="161" y="128" width="78" height="41" rx="3" fill="#0f172a"/>
  <text x="200" y="146" font-family="monospace,sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">NAND FLASH</text>
  <text x="200" y="160" font-family="monospace,sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">3D TLC</text>

  <!-- USB-C port -->
  <rect x="168" y="207" width="64" height="21" rx="4" fill="#334155"/>
  <rect x="176" y="210" width="48" height="15" rx="7" fill="#0f172a"/>
  <ellipse cx="200" cy="217" rx="17" ry="5.5" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>

  <!-- LED indicator -->
  <circle cx="308" cy="80" r="6" fill="#22c55e"/>
  <circle cx="308" cy="80" r="10" fill="#22c55e" opacity="0.25"/>
  <circle cx="308" cy="80" r="15" fill="#22c55e" opacity="0.1"/>

  <!-- Speed label -->
  <text x="200" y="256" font-family="Arial,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" letter-spacing="0.5">⚡ 1 000 Mo/s · USB 3.2 Gen 2</text>

  <!-- Eco badge -->
  <rect x="84" y="182" width="60" height="21" rx="10" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <text x="114" y="196" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#22c55e" text-anchor="middle">♻ ÉCO</text>
</svg>
