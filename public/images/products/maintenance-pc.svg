<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  <circle cx="45" cy="45" r="90" fill="#22c55e" opacity="0.07"/>
  <circle cx="365" cy="265" r="110" fill="#3b82f6" opacity="0.05"/>

  <!-- Laptop screen frame -->
  <rect x="105" y="33" width="190" height="132" rx="10" fill="#1f2937" filter="url(#s)"/>
  <rect x="113" y="41" width="174" height="116" rx="5" fill="#111827"/>

  <!-- Screen content -->
  <rect x="119" y="47" width="162" height="104" rx="3" fill="#0d1117"/>
  <!-- Title bar -->
  <rect x="119" y="47" width="162" height="15" rx="3" fill="#1f2937"/>
  <circle cx="128" cy="54.5" r="3.5" fill="#ef4444"/>
  <circle cx="138" cy="54.5" r="3.5" fill="#f59e0b"/>
  <circle cx="148" cy="54.5" r="3.5" fill="#22c55e"/>
  <text x="200" y="57" font-family="monospace,sans-serif" font-size="6" fill="#6b7280" text-anchor="middle">maintenance — système</text>
  <!-- Terminal lines -->
  <text x="126" y="75" font-family="monospace,sans-serif" font-size="6.5" fill="#22c55e">$ sudo clean --deep-scan</text>
  <text x="126" y="88" font-family="monospace,sans-serif" font-size="6.5" fill="#4ade80">✓ Poussière : nettoyée</text>
  <text x="126" y="101" font-family="monospace,sans-serif" font-size="6.5" fill="#4ade80">✓ Pâte thermique : OK</text>
  <text x="126" y="114" font-family="monospace,sans-serif" font-size="6.5" fill="#4ade80">✓ Ventilateurs : 100%</text>
  <!-- Progress bar -->
  <rect x="126" y="124" width="148" height="5" rx="2.5" fill="#1e293b"/>
  <rect x="126" y="124" width="133" height="5" rx="2.5" fill="#22c55e"/>
  <text x="126" y="139" font-family="monospace,sans-serif" font-size="6" fill="#64748b">Optimisation : 90% ████████░</text>
  <!-- Camera -->
  <circle cx="200" cy="39" r="3" fill="#374151"/>
  <circle cx="200" cy="39" r="1.5" fill="#1f2937"/>

  <!-- Hinge -->
  <rect x="103" y="163" width="194" height="6" rx="3" fill="#374151"/>

  <!-- Laptop base -->
  <rect x="103" y="167" width="194" height="76" rx="10" fill="#1f2937" filter="url(#s)"/>
  <rect x="115" y="175" width="170" height="46" rx="3" fill="#111827"/>
  <rect x="120" y="179" width="160" height="8" rx="2" fill="#1f2937"/>
  <rect x="120" y="191" width="160" height="8" rx="2" fill="#1f2937"/>
  <rect x="124" y="203" width="152" height="8" rx="2" fill="#1f2937"/>
  <!-- Trackpad -->
  <rect x="163" y="223" width="74" height="16" rx="4" fill="#0d1117"/>

  <!-- Wrench (top-right) -->
  <g transform="translate(318, 88) rotate(42)" filter="url(#s)">
    <rect x="-5" y="2" width="10" height="52" rx="5" fill="#f59e0b"/>
    <rect x="-7" y="-20" width="14" height="26" rx="3" fill="#f59e0b"/>
    <rect x="-14" y="-20" width="8" height="13" rx="2" fill="#f59e0b"/>
    <rect x="6" y="-20" width="8" height="13" rx="2" fill="#f59e0b"/>
    <rect x="-7" y="-20" width="14" height="7" rx="1" fill="#f0fdf4"/>
  </g>

  <!-- Screwdriver (left) -->
  <g transform="translate(70, 145) rotate(-28)" filter="url(#s)">
    <rect x="-8" y="-42" width="16" height="34" rx="8" fill="#3b82f6"/>
    <line x1="-8" y1="-34" x2="8" y2="-34" stroke="#2563eb" stroke-width="2"/>
    <line x1="-8" y1="-25" x2="8" y2="-25" stroke="#2563eb" stroke-width="2"/>
    <line x1="-8" y1="-16" x2="8" y2="-16" stroke="#2563eb" stroke-width="2"/>
    <rect x="-2.5" y="-8" width="5" height="54" fill="#94a3b8"/>
    <rect x="-5" y="44" width="10" height="6" rx="1" fill="#64748b"/>
    <rect x="-5.5" y="48" width="11" height="3" fill="#475569"/>
  </g>

  <!-- Dust particles -->
  <circle cx="282" cy="192" r="3" fill="#d1d5db" opacity="0.7"/>
  <circle cx="268" cy="202" r="2" fill="#d1d5db" opacity="0.5"/>
  <circle cx="293" cy="207" r="1.5" fill="#d1d5db" opacity="0.6"/>
  <circle cx="276" cy="212" r="2.5" fill="#d1d5db" opacity="0.4"/>

  <!-- Certified badge -->
  <circle cx="345" cy="47" r="26" fill="#ffffff" filter="url(#s)"/>
  <circle cx="345" cy="47" r="22" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="345" y="40" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#15803d" text-anchor="middle">CERTIFIÉ</text>
  <text x="345" y="53" font-family="Arial,sans-serif" font-size="15" fill="#16a34a" text-anchor="middle">✓</text>
  <text x="345" y="63" font-family="Arial,sans-serif" font-size="6" fill="#15803d" text-anchor="middle">QUALITÉ</text>

  <!-- Footer -->
  <text x="200" y="274" font-family="Arial,sans-serif" font-size="9.5" fill="#374151" text-anchor="middle" letter-spacing="0.8">MAINTENANCE &amp; NETTOYAGE PROFESSIONNEL</text>
</svg>
